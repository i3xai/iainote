name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # CLI tools
          - binary: iainote-cli
            target: x86_64-unknown-linux-musl
            artifact: iainote-linux-amd64
          - binary: iainote-cli
            target: aarch64-unknown-linux-musl
            artifact: iainote-linux-arm64
          - binary: iainote-cli
            target: x86_64-apple-darwin
            artifact: iainote-macos-intel
          - binary: iainote-cli
            target: aarch64-apple-darwin
            artifact: iainote-macos-apple-silicon
          - binary: iainote-cli
            target: armv7-unknown-linux-musleabihf
            artifact: iainote-linux-armv7
          # Server binary
          - binary: iainote-server
            target: x86_64-unknown-linux-musl
            artifact: iainote-server-linux-amd64
          - binary: iainote-server
            target: aarch64-unknown-linux-musl
            artifact: iainote-server-linux-arm64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: |
          cargo install cross --locked

      - name: Build ${{ matrix.binary }} for ${{ matrix.target }}
        run: |
          cross build --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} /tmp/${{ matrix.artifact }}
          chmod +x /tmp/${{ matrix.artifact }}
          tar czf /tmp/${{ matrix.artifact }}.tar.gz -C /tmp ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/${{ matrix.artifact }}.tar.gz
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tar.gz for each artifact
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [ -f "${name}/${name}" ]; then
              tar czf "${name}.tar.gz" -C "${name}" .
              rm -rf "${name}"
            fi
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
