name: Multi-Arch Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Linux targets — 可以在 ubuntu-latest 上用 cross 交叉编译
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: iainote-cli
            target: x86_64-unknown-linux-musl
          - binary: iainote-cli
            target: aarch64-unknown-linux-musl
          - binary: iainote-cli
            target: armv7-unknown-linux-musleabihf

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --locked

      - name: Build ${{ matrix.binary }} (${{ matrix.target }})
        run: cross build --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Check binary
        run: |
          file target/${{ matrix.target }}/release/${{ matrix.binary }}
          echo "Binary built OK"

  # macOS targets — 必须在 macOS-latest runners 上原生编译
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: iainote-cli
            target: x86_64-apple-darwin
          - binary: iainote-cli
            target: aarch64-apple-darwin

    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Build ${{ matrix.binary }} (${{ matrix.target }})
        run: cargo build --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Check binary
        run: |
          file target/${{ matrix.target }}/release/${{ matrix.binary }}
          echo "Binary built OK"
