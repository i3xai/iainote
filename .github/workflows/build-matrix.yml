name: Multi-Arch Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: iainote-cli
            target: x86_64-unknown-linux-musl
          - binary: iainote-cli
            target: aarch64-unknown-linux-musl
          - binary: iainote-cli
            target: x86_64-apple-darwin
          - binary: iainote-cli
            target: aarch64-apple-darwin
          - binary: iainote-cli
            target: armv7-unknown-linux-musleabihf
          - binary: iainote-server
            target: x86_64-unknown-linux-musl
          - binary: iainote-server
            target: aarch64-unknown-linux-musl

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --locked

      - name: Build ${{ matrix.binary }} (${{ matrix.target }})
        run: cross build --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Check binary
        run: |
          file target/${{ matrix.target }}/release/${{ matrix.binary }}
          target/${{ matrix.target }}/release/${{ matrix.binary }} --version 2>/dev/null || \
          target/${{ matrix.target }}/release/${{ matrix.binary }} --help 2>/dev/null || \
          echo "Binary built OK"
